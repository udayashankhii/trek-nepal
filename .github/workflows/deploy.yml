name: Build and Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_API_URL:                  ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID:         ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_MAPS_API_KEY:      ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID:       ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}
          VITE_OPEN_METEO_API_URL:       ${{ secrets.VITE_OPEN_METEO_API_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY:   ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME:    ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_RISK_API_URL:             ${{ secrets.VITE_RISK_API_URL }}
          VITE_CHATBOT_URL:              ${{ secrets.VITE_CHATBOT_URL }}
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist to cPanel via rsync
        run: |
          rsync -avz \
            --exclude='.well-known/' \
            --exclude='cgi-bin/' \
            --exclude='googlec*.html' \
            -e "ssh -p ${{ secrets.CPANEL_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:${{ secrets.CPANEL_DEPLOY_PATH }}/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
