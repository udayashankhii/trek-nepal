name: Build & Deploy Frontend to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Show build output
        run: |
          ls -la dist/
          du -sh dist/

      - name: Deploy dist/ to cPanel via rsync
        uses: easingthemes/ssh-deploy@v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          REMOTE_HOST:     ${{ secrets.CPANEL_HOST }}
          REMOTE_USER:     ${{ secrets.CPANEL_USERNAME }}
          REMOTE_PORT:     ${{ secrets.CPANEL_PORT }}
          SOURCE:          "dist/"
          TARGET:          ${{ secrets.CPANEL_DEPLOY_PATH }}
          ARGS: >-
            -rltDzvO
            --exclude=.env.production
            --exclude=.htaccess
            --exclude=.well-known/
            --exclude=cgi-bin/
            --exclude=googlec*.html
            --exclude=dist.zip

      - name: Verify site is live
        run: |
          sleep 5
          curl -sSf -o /dev/null -w "Site responded: HTTP %{http_code}\n" https://evertreknepal.com/
